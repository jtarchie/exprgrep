version: 2

project_name: exprgrep

builds:
  - id: exprgrep
    binary: exprgrep
    main: .
    env:
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

brews:
  - name: exprgrep
    directory: Formula
    repository:
      owner: jtarchie
      name: exprgrep
      token: "{{ .Env.GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/jtarchie/exprgrep"
    description: "Filter JSONL lines by an expr expression"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "exprgrep"
    test: |
      system "#{bin}/exprgrep", "--help"

