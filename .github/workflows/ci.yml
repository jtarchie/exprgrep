name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...
        env:
          GOEXPERIMENT: jsonv2

      - name: Test
        run: go test ./...
        env:
          GOEXPERIMENT: jsonv2
